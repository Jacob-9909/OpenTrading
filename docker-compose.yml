services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coin
      POSTGRES_PASSWORD: coin
      POSTGRES_DB: coin_trading
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coin -d coin_trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://coin:coin@db:5432/coin_trading
    depends_on:
      db:
        condition: service_healthy
    command: ["coin-trading", "serve-all"]
    restart: unless-stopped

  dashboard:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://coin:coin@db:5432/coin_trading
    depends_on:
      db:
        condition: service_healthy
    command: ["streamlit", "run", "src/coin_trading/dashboard.py", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  postgres_data:
